query($owner: String!, $name: String!, $number: Int!, $endCursor: String) {
  repository(owner: $owner, name: $name) {
    issue(number: $number) {
      title
      url
      number
      bodyText
      timelineItems(first: 100, itemTypes: [LABELED_EVENT], after: $endCursor) {
        pageInfo {
          endCursor
          hasNextPage
        }
        edges {
          node {
            __typename
            ... on LabeledEvent {
              createdAt
              label {
                name
              }
            }
          }
        }
      }
    }
  }
}
