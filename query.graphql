query ($owner: String!, $name: String!, $limit: Int!) {
  repository(owner: $owner, name: $name) {
    issues(
      labels: ["Proposal-Accepted"]
      states: [OPEN]
      first: $limit
      orderBy: {field: UPDATED_AT, direction: DESC}
    ) {
      edges {
        node {
          number
        }
      }
    }
  }
}
